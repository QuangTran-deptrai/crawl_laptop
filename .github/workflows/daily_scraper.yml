name: Daily Laptop Data Scraper (Parallel)

on:
  schedule:
    - cron: '0 0 * * *' # 7h sáng VN
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1" # Ép Python in log ra ngay lập tức để không bị tưởng là treo

jobs:
  scrape:
    name: Cào dữ liệu ${{ matrix.script }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Đừng huỷ các tiến trình khác nếu có 1 web bị lỗi
      matrix:
        script: 
          - fptshop_scrape.py
          - tgdd_scrape.py
          - cellphones_scrape.py
          - phongvu_scrape.py
          - gearvn_scrape.py

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cài đặt thư viện Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cài đặt Playwright & Patchright Chromium
        run: |
          playwright install chromium
          patchright install chromium

      - name: Cài đặt màn hình ảo (Xvfb)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Chạy script cào dữ liệu
        continue-on-error: true # Cho phép lỗi (ví dụ không tìm thấy element) để không sập workflow
        run: xvfb-run python ${{ matrix.script }}

      - name: Tải file Excel lên bộ nhớ tạm
        uses: actions/upload-artifact@v4
        with:
          name: excel-data-${{ matrix.script }}
          path: |
            *.xlsx
            *_pending.txt
          if-no-files-found: ignore
          retention-days: 1 # Chỉ lưu 1 ngày để dọn rác

  sync:
    name: Đồng bộ dữ liệu & Báo cáo
    needs: scrape # Đảm bảo job này chỉ chạy khi 5 máy ảo trên kia đã chạy xong
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền cho lệnh push lên Github
      actions: write # Cấp quyền kích hoạt lại workflow

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cài đặt thư viện Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tải 5 file Excel từ bộ nhớ tạm về máy ảo này
        uses: actions/download-artifact@v4
        with:
          pattern: excel-data-*
          merge-multiple: true # Gộp chung tất cả file xlsx vào cùng 1 thư mục hiện tại

      - name: Đẩy lên Google Sheets và Báo cáo Telegram
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEETS_WEBHOOK_URL }}
        run: python sync_excel_to_sheets.py

      - name: Đẩy file Excel và trạng thái lên Github Repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Cập nhật tất cả file xlsx và pending.txt (bao gồm cả file bị xóa nếu đã cào xong)
          git add -A *.xlsx || true
          git add -A *_pending.txt || true
          
          # Chỉ commit nếu có sự thay đổi
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Lưu trạng thái cào dữ liệu và Excel [skip ci]" && git push)

      - name: Tiếp tục cào nếu còn dang dở
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ls *_pending.txt 1> /dev/null 2>&1; then
            echo "Phát hiện file pending. Tự động kích hoạt chạy tiếp luồng mới..."
            gh workflow run daily_scraper.yml
          else
            echo "🎉 TẤT CẢ CÁC WEB ĐÃ ĐƯỢC CÀO XONG 100%!"
          fi
