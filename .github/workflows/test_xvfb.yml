name: Test Xvfb and Undetected Chromedriver

on:
  workflow_dispatch: # Cho phép click chạy thủ công trên giao diện Github

jobs:
  test-xvfb:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài đặt xvfb (Màn hình ảo)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Cài đặt thư viện Python
        run: |
          python -m pip install --upgrade pip
          pip install undetected-chromedriver selenium

      - name: Chạy script test với màn hình ảo
        run: xvfb-run python test_uc.py
