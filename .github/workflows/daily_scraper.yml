name: Daily Laptop Data Scraper (Parallel)

on:
  schedule:
    - cron: '0 0 * * *' # 7h sáng VN
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1" # Ép Python in log ra ngay lập tức để không bị tưởng là treo

jobs:
  scrape:
    name: Cào dữ liệu ${{ matrix.script }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Đừng huỷ các tiến trình khác nếu có 1 web bị lỗi
      matrix:
        script: 
          - fptshop_scrape.py
          - tgdd_scrape.py
          - cellphones_scrape.py
          - phongvu_scrape.py
          - gearvn_scrape.py
        chunk: [1, 2, 3, 4]

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cài đặt thư viện Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cài đặt Playwright & Patchright Chromium
        run: |
          playwright install chromium
          patchright install chromium

      - name: Cài đặt màn hình ảo (Xvfb)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Chạy script cào dữ liệu
        continue-on-error: true # Cho phép lỗi (ví dụ không tìm thấy element) để không sập workflow
        run: xvfb-run python ${{ matrix.script }} --chunk ${{ matrix.chunk }} --total-chunks 4

      - name: Tải file Excel và trạng thái lên bộ nhớ tạm
        uses: actions/upload-artifact@v4
        with:
          name: excel-data-${{ matrix.script }}-chunk-${{ matrix.chunk }}
          path: |
            *.xlsx
            *_pending*.txt
          if-no-files-found: ignore
          retention-days: 1 # Chỉ lưu 1 ngày để dọn rác

  sync:
    name: Đồng bộ dữ liệu & Báo cáo
    needs: scrape # Đảm bảo job này chỉ chạy khi 5 máy ảo trên kia đã chạy xong
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền cho lệnh push lên Github
      actions: write # Cấp quyền kích hoạt lại workflow

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Xóa pending cũ nội bộ để cập nhật trạng thái mới nhất
        run: rm -f *_pending*.txt || true

      - name: Cài đặt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cài đặt thư viện Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tải 5 file Excel từ bộ nhớ tạm về máy ảo này
        uses: actions/download-artifact@v4
        with:
          pattern: excel-data-*
          merge-multiple: true # Gộp chung tất cả file xlsx vào cùng 1 thư mục hiện tại

      - name: Kiểm tra trạng thái và Quyết định (Merge hay Retry)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEETS_WEBHOOK_URL }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if ls *_pending*.txt 1> /dev/null 2>&1; then
            echo "Phát hiện còn file pending. Lưu Excel tạm và kích hoạt Retry..."
            git add -A *.xlsx || true
            git add -A *_pending*.txt || true
            git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Lưu trạng thái dang dở (Matrix Sharding) [skip ci]" && git push)
            
            # Kích hoạt lại chính workflow này
            gh workflow run daily_scraper.yml
          else
            echo "🎉 TẤT CẢ CÁC WEB ĐÃ ĐƯỢC CÀO XONG 100%!"
            echo "Tiến hành gộp mảnh và đẩy lên Google Sheets..."
            
            # Xóa sạch pending trên Git (nếu có)
            git rm *_pending*.txt --ignore-unmatch || true
            
            # Gộp
            python chunk_merger.py
            
            # Đẩy lên GG Sheets
            python sync_excel_to_sheets.py
            
            # Commit file all
            git add -A *.xlsx || true
            git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Hoàn thành cào dữ liệu [skip ci]" && git push)
          fi
