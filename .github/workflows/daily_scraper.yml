name: Daily Laptop Data Scraper (Parallel)

on:
  schedule:
    - cron: '15 0 * * *' # 7h15 sáng VN (Tránh kẹt xe giờ cao điểm của Github)
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1" # Ép Python in log ra ngay lập tức để không bị tưởng là treo
  PYTHONIOENCODING: "utf-8" # Fix lỗi in tiếng Việt (Unicode) trên Windows
  TZ: "Asia/Ho_Chi_Minh" # Set múi giờ Việt Nam cho máy chủ ảo Ubuntu

jobs:
  prepare_links:
    name: Chuẩn bị Link ${{ matrix.script_info.name }}
    runs-on: ${{ matrix.script_info.os }}
    strategy:
      fail-fast: false
      matrix:
        script_info: 
          - { name: fptshop_scrape.py, os: self-hosted, prefix: fptshop }
          - { name: phongvu_scrape.py, os: self-hosted, prefix: phongvu }
          - { name: tgdd_scrape.py, os: self-hosted, prefix: tgdd }
          - { name: cellphones_scrape.py, os: ubuntu-latest, prefix: cellphones }
          - { name: gearvn_scrape.py, os: ubuntu-latest, prefix: gearvn }

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Python 3.11 (Chỉ Ubuntu)
        if: matrix.script_info.os == 'ubuntu-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cài đặt thư viện Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cài đặt Playwright & Patchright Chromium
        run: |
          playwright install chromium
          patchright install chromium

      - name: Cài đặt màn hình ảo (Xvfb) (Chỉ Ubuntu)
        if: matrix.script_info.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Quét toàn bộ Link (Ubuntu)
        if: matrix.script_info.os == 'ubuntu-latest'
        continue-on-error: true
        run: xvfb-run python ${{ matrix.script_info.name }} --get-links-only

      - name: Quét toàn bộ Link (Windows Self-hosted)
        if: matrix.script_info.os == 'self-hosted'
        continue-on-error: true
        run: python ${{ matrix.script_info.name }} --get-links-only

      - name: Tải file danh sách link lên bộ nhớ tạm
        uses: actions/upload-artifact@v4
        with:
          name: links-${{ matrix.script_info.prefix }}
          path: "*_links.txt"
          if-no-files-found: ignore
          retention-days: 1

  scrape:
    name: Cào dữ liệu ${{ matrix.script_info.name }}
    needs: prepare_links
    runs-on: ${{ matrix.script_info.os }}
    strategy:
      fail-fast: false # Đừng huỷ các tiến trình khác nếu có 1 web bị lỗi
      matrix:
        script_info: 
          - { name: fptshop_scrape.py, os: self-hosted, prefix: fptshop }
          - { name: phongvu_scrape.py, os: self-hosted, prefix: phongvu }
          - { name: tgdd_scrape.py, os: self-hosted, prefix: tgdd }
          - { name: cellphones_scrape.py, os: ubuntu-latest, prefix: cellphones }
          - { name: gearvn_scrape.py, os: ubuntu-latest, prefix: gearvn }
        chunk: [1, 2, 3, 4, 5]

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
        
      - name: Tải danh sách link từ đám mây
        uses: actions/download-artifact@v4
        with:
          name: links-${{ matrix.script_info.prefix }}
        continue-on-error: true


      - name: Cài đặt Python 3.11 (Chỉ Ubuntu)
        if: matrix.script_info.os == 'ubuntu-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cài đặt thư viện Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cài đặt Playwright & Patchright Chromium
        run: |
          playwright install chromium
          patchright install chromium

      - name: Cài đặt màn hình ảo (Xvfb) (Chỉ Ubuntu)
        if: matrix.script_info.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Chạy script cào dữ liệu (Ubuntu)
        if: matrix.script_info.os == 'ubuntu-latest'
        continue-on-error: true # Cho phép lỗi (ví dụ không tìm thấy element) để không sập workflow
        run: xvfb-run python ${{ matrix.script_info.name }} --chunk ${{ matrix.chunk }} --total-chunks 5

      - name: Chạy script cào dữ liệu (Windows Self-hosted)
        if: matrix.script_info.os == 'self-hosted'
        continue-on-error: true
        run: python ${{ matrix.script_info.name }} --chunk ${{ matrix.chunk }} --total-chunks 5

      - name: Tải file Excel và trạng thái lên bộ nhớ tạm
        uses: actions/upload-artifact@v4
        with:
          name: excel-data-${{ matrix.script_info.name }}-chunk-${{ matrix.chunk }}
          path: |
            *.xlsx
            *_pending*.txt
          if-no-files-found: ignore
          retention-days: 1 # Chỉ lưu 1 ngày để dọn rác

  sync:
    name: Đồng bộ dữ liệu & Báo cáo
    needs: scrape # Đảm bảo job này chỉ chạy khi 5 máy ảo trên kia đã chạy xong
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền cho lệnh push lên Github
      actions: write # Cấp quyền kích hoạt lại workflow

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Xóa pending cũ nội bộ để cập nhật trạng thái mới nhất
        run: rm -f *_pending*.txt || true

      - name: Cài đặt Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cài đặt thư viện Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tải 5 file Excel từ bộ nhớ tạm về máy ảo này
        uses: actions/download-artifact@v4
        with:
          pattern: excel-data-*
          merge-multiple: true # Gộp chung tất cả file xlsx vào cùng 1 thư mục hiện tại

      - name: Kiểm tra trạng thái và Quyết định (Merge hay Retry)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEETS_WEBHOOK_URL }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          count=$(cat retry_count.txt 2>/dev/null || echo "0")
          
          if ls *_pending*.txt 1> /dev/null 2>&1; then
            if [ "$count" -ge 3 ]; then
              echo "⚠️ CẢNH BÁO: Đã Retry 3 lần nhưng vẫn còn file pending (có thể do bị chặn IP cứng). Dừng Retry để tránh lặp vô tận!"
              echo "0" > retry_count.txt
              # Tiếp tục chạy xuống khối gộp data bên dưới
            else
              count=$((count + 1))
              echo "$count" > retry_count.txt
              echo "Phát hiện còn file pending. Lưu Excel tạm và kích hoạt Retry lần $count..."
              
              git add -A *.xlsx || true
              git add -A *_pending*.txt || true
              git add retry_count.txt || true
              git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Lưu trạng thái dang dở (Retry lần $count) [skip ci]" && git push)
              
              # Kích hoạt lại chính workflow này
              gh workflow run daily_scraper.yml
              exit 0 # Dừng nhánh này tại đây
            fi
          fi
          
          echo "🎉 HOÀN THÀNH CÀO DỮ LIỆU!"
          echo "Tiến hành gộp mảnh và đẩy lên Google Sheets..."
          echo "0" > retry_count.txt
            
          # Xóa sạch pending trên Git (nếu có)
          git rm *_pending*.txt --ignore-unmatch || true
          
          # Gộp
          python chunk_merger.py
          
          # Đẩy lên GG Sheets
          python sync_excel_to_sheets.py
          
          # Commit file all
          git add -A *.xlsx || true
          git add retry_count.txt || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Hoàn thành cào dữ liệu [skip ci]" && git push)
